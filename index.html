<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furby Care</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a2e;
    color: #f0e6d3;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #game-container { position: relative; width: 700px; text-align: center; }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: #ff9ecf;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }

  /* Room tabs */
  #room-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: -3px;
    position: relative;
    z-index: 2;
  }
  .room-tab {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 8px 18px;
    background: #1a0a2e;
    border: 3px solid #4a2a6a;
    border-bottom: none;
    border-radius: 10px 10px 0 0;
    color: #6a5a80;
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 2px;
  }
  .room-tab:hover { background: #2a1a3e; color: #cba6f7; }
  .room-tab.active {
    background: #2d1b4e;
    color: #f0e6d3;
    border-color: #6b3fa0;
    box-shadow: 0 0 15px rgba(139,92,246,0.3);
    z-index: 3;
  }
  .room-tab.active[data-room="bathroom"] { background: #1a3040; border-color: #2980b9; }
  .room-tab.active[data-room="bedroom"] { background: #150820; border-color: #8b5cf6; }
  .room-tab:disabled { opacity: 0.3; cursor: not-allowed; }
  .room-tab.demanding {
    animation: tab-pulse 0.8s ease infinite;
    border-color: #e74c3c !important;
    color: #e74c3c !important;
  }
  @keyframes tab-pulse { 0%,100%{box-shadow: 0 0 5px rgba(231,76,60,0.3)} 50%{box-shadow: 0 0 20px rgba(231,76,60,0.8)} }

  /* Stage */
  #furby-stage {
    position: relative;
    border: 3px solid #6b3fa0;
    border-radius: 0 0 15px 15px;
    min-height: 440px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(107,63,160,0.4), inset 0 0 60px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background 0.5s;
  }
  #furby-stage.room-living {
    background: linear-gradient(180deg, #2d1b4e 0%, #1a0a2e 40%, #3d2b1a 85%, #5a4a30 100%);
  }
  #furby-stage.room-bathroom {
    background: linear-gradient(180deg, #1a3a4e 0%, #0e2a3a 40%, #1a4050 85%, #2a5a6a 100%);
  }
  #furby-stage.room-bedroom {
    background: linear-gradient(180deg, #150820 0%, #0a0518 40%, #150820 85%, #1a0a2e 100%);
  }
  #furby-stage::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 100%;
    opacity: 0.25; z-index: 0;
    transition: background 0.5s;
  }
  #furby-stage.room-living::before {
    background: linear-gradient(180deg, #8b2252 0%, #c0392b 30%, #8b2252 100%);
  }
  #furby-stage.room-bathroom::before {
    background: linear-gradient(180deg, #2980b9 0%, #3498db 30%, #2980b9 100%);
  }
  #furby-stage.room-bedroom::before {
    background: linear-gradient(180deg, #4a1a6e 0%, #6b3fa0 30%, #4a1a6e 100%);
    opacity: 0.15;
  }

  /* Furby SVG container */
  #furby-wrap {
    position: relative;
    z-index: 1;
    width: 300px;
    height: 380px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.3s;
  }
  #furby-wrap svg { width: 300px; height: 300px; filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4)); }

  /* Idle bob */
  #furby-wrap.idle { animation: bob 2s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  /* Action animations */
  #furby-wrap.bounce { animation: bounce 0.5s ease; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  #furby-wrap.wiggle { animation: wiggle 0.5s ease; }
  @keyframes wiggle { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
  #furby-wrap.squish { animation: squish 0.5s ease; }
  @keyframes squish { 0%,100%{transform:scale(1,1)} 50%{transform:scale(1.06,0.94)} }

  /* Leaving */
  #furby-wrap.leaving { animation: leave 4s ease-in forwards; }
  @keyframes leave {
    0%{transform:translateX(0) translateY(0);opacity:1}
    15%{transform:translateX(0) translateY(-15px);opacity:1}
    30%{transform:translateX(0) translateY(0);opacity:1}
    100%{transform:translateX(700px) translateY(0);opacity:0}
  }

  /* Blink overlay */
  .eye-closed { display: none; }
  #furby-wrap.blink .eye-closed { display: block; }
  #furby-wrap.blink .eye-open { display: none; }

  /* Sleeping state */
  #furby-wrap.sleeping { animation: breathing 3s ease-in-out infinite; }
  @keyframes breathing { 0%,100%{transform:scale(1,1)} 50%{transform:scale(1.02,0.98)} }
  #furby-wrap.sleeping .eye-open { display: none; }
  #furby-wrap.sleeping .eye-closed { display: block; }
  #furby-wrap.sleeping #sad-eyes { display: none !important; }
  #furby-wrap.sleeping #angry-brows { display: none !important; }

  /* Zzz floating */
  #zzz-container {
    display: none;
    position: absolute;
    right: 140px;
    top: 80px;
    z-index: 20;
  }
  #zzz-container.show { display: block; }
  .zzz {
    font-family: 'Press Start 2P', monospace;
    color: #cba6f7;
    position: absolute;
    animation: zzz-float 2.5s ease-out infinite;
    text-shadow: 0 0 10px rgba(203,166,247,0.5);
  }
  .zzz:nth-child(1) { font-size: 10px; left: 0; top: 0; }
  .zzz:nth-child(2) { font-size: 14px; left: 15px; top: -10px; animation-delay: 0.8s; }
  .zzz:nth-child(3) { font-size: 18px; left: 30px; top: -20px; animation-delay: 1.6s; }
  @keyframes zzz-float {
    0% { opacity: 1; transform: translateY(0) translateX(0); }
    100% { opacity: 0; transform: translateY(-50px) translateX(15px); }
  }

  /* Mouth animation */
  #mouth-open { display: none; }
  #furby-wrap.eating #mouth-open,
  #furby-wrap.drinking #mouth-open { display: block; }
  #furby-wrap.eating #mouth-closed,
  #furby-wrap.drinking #mouth-closed { display: none; }

  /* Sad eyes */
  #sad-eyes { display: none; }
  #furby-wrap.sad-mood #sad-eyes { display: block; }
  #furby-wrap.sad-mood .eye-open { display: none; }

  /* Angry eyes */
  #angry-brows { display: none; }
  #furby-wrap.angry-mood #angry-brows { display: block; }

  /* Ears wiggle */
  #left-ear { transform-origin: 42px 31px; animation: ear-wiggle-l 3s ease-in-out infinite; }
  #right-ear { transform-origin: 68px 31px; animation: ear-wiggle-r 3s ease-in-out infinite; }
  @keyframes ear-wiggle-l { 0%,100%{transform:rotate(0)} 50%{transform:rotate(-5deg)} }
  @keyframes ear-wiggle-r { 0%,100%{transform:rotate(0)} 50%{transform:rotate(5deg)} }

  /* Hair sway */
  #hair { transform-origin: 55px 35px; animation: hair-sway 2.5s ease-in-out infinite; }
  @keyframes hair-sway { 0%,100%{transform:rotate(0)} 30%{transform:rotate(3deg)} 70%{transform:rotate(-3deg)} }

  /* Petting hearts */
  #pet-hearts { display: none; }
  #furby-wrap.petting #pet-hearts { display: block; }
  .float-heart { animation: float-h 1s ease-out infinite; }
  .float-heart:nth-child(2) { animation-delay: 0.3s; }
  .float-heart:nth-child(3) { animation-delay: 0.6s; }
  @keyframes float-h { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-20px) scale(1.5)} }

  /* Suitcase */
  #suitcase-group { display: none; opacity: 0; transition: opacity 0.5s; }
  #suitcase-group.show { display: block; opacity: 1; }

  /* Toilet break */
  #furby-wrap.potty-walk { animation: potty-walk 1.2s ease-in forwards; }
  @keyframes potty-walk {
    0%{transform:translateX(0);opacity:1}
    80%{transform:translateX(-320px);opacity:1}
    100%{transform:translateX(-350px);opacity:0}
  }
  #furby-wrap.potty-return { animation: potty-return 1.2s ease-out forwards; }
  @keyframes potty-return {
    0%{transform:translateX(-350px);opacity:0}
    20%{transform:translateX(-320px);opacity:1}
    100%{transform:translateX(0);opacity:1}
  }

  #toilet-screen {
    display: none;
    position: absolute;
    left: 30px; top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    text-align: center;
  }
  #toilet-screen.show { display: block; }
  #toilet-screen .toilet-door {
    width: 120px; height: 180px;
    background: linear-gradient(180deg, #5a3a1a, #7a5a30);
    border-radius: 8px 8px 0 0;
    border: 3px solid #4a2a10;
    position: relative;
    margin: 0 auto;
    box-shadow: 4px 4px 15px rgba(0,0,0,0.5);
  }
  #toilet-screen .door-sign {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #ffd700;
    background: #3a1a0a;
    padding: 4px 8px;
    border-radius: 4px;
    position: absolute;
    top: 15px; left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  #toilet-screen .door-handle {
    width: 8px; height: 8px;
    background: #d4a040;
    border-radius: 50%;
    position: absolute;
    right: 15px; top: 50%;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.4);
  }
  #toilet-screen .occupied-light {
    width: 12px; height: 12px;
    background: #e74c3c;
    border-radius: 50%;
    position: absolute;
    top: 50px; left: 50%;
    transform: translateX(-50%);
    animation: occupied-blink 1s ease infinite;
    box-shadow: 0 0 8px rgba(231,76,60,0.6);
  }
  @keyframes occupied-blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #toilet-screen .sfx-bubbles {
    position: absolute;
    bottom: -10px; left: 50%;
    transform: translateX(-50%);
    font-size: 16px;
    animation: sfx-float 0.8s ease-in-out infinite;
  }
  @keyframes sfx-float { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }
  #toilet-screen .thought-bubble {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #aaa;
    margin-top: 8px;
  }

  /* Toilet request icon */
  #toilet-request {
    display: none;
    position: absolute;
    bottom: 30px;
    right: 40px;
    z-index: 15;
    font-size: 36px;
    background: rgba(241, 196, 15, 0.15);
    border: 3px solid #f1c40f;
    border-radius: 50%;
    width: 65px;
    height: 65px;
    cursor: pointer;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    transition: all 0.2s;
  }
  #toilet-request.show { display: flex; animation: toilet-need-pulse 0.6s ease infinite; }
  #toilet-request:hover { background: rgba(241, 196, 15, 0.3); transform: scale(1.1); }
  #toilet-request .countdown {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: #e74c3c;
    margin-top: 2px;
  }
  @keyframes toilet-need-pulse {
    0%,100% { box-shadow: 0 0 8px rgba(241,196,15,0.3); }
    50% { box-shadow: 0 0 25px rgba(241,196,15,0.7); }
  }

  /* Poop indicator */
  #poop-indicator {
    display: none;
    position: absolute;
    right: 120px;
    bottom: 60px;
    z-index: 15;
  }
  #poop-indicator.show { display: block; }
  .poop-emoji { font-size: 90px; }
  .fly {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #333;
    border-radius: 50%;
    top: 40px;
    left: 40px;
    animation: fly-buzz 1.5s ease-in-out infinite;
  }
  .fly:nth-child(2) { animation-duration: 1.2s; }
  .fly:nth-child(3) { animation-duration: 1.6s; animation-delay: 0.2s; }
  .fly:nth-child(4) { animation-duration: 1.0s; animation-delay: 0.4s; }
  .fly:nth-child(5) { animation-duration: 1.4s; animation-delay: 0.6s; }
  .fly:nth-child(6) { animation-duration: 1.8s; animation-delay: 0.1s; }
  @keyframes fly-buzz {
    0%,100% { transform: translate(0, 0); }
    10% { transform: translate(40px, -30px); }
    25% { transform: translate(-25px, -45px); }
    40% { transform: translate(45px, 15px); }
    55% { transform: translate(-35px, 30px); }
    70% { transform: translate(30px, -40px); }
    85% { transform: translate(-45px, -10px); }
  }

  /* Clean button */
  #clean-btn {
    display: none;
    position: absolute;
    bottom: 30px;
    right: 40px;
    z-index: 15;
    font-size: 22px;
    font-family: 'Press Start 2P', monospace;
    background: linear-gradient(180deg, #27ae60, #1e8449);
    border: 3px solid #2ecc71;
    border-radius: 15px;
    color: white;
    padding: 10px 16px;
    cursor: pointer;
    box-shadow: 0 4px 0 #145a32, 0 0 15px rgba(46,204,113,0.3);
    animation: toilet-need-pulse 0.8s ease infinite;
  }
  #clean-btn.show { display: block; }
  #clean-btn:hover { background: linear-gradient(180deg, #2ecc71, #27ae60); transform: translateY(-2px); }
  #clean-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #145a32; }
  #clean-btn .btn-label { display: block; font-size: 7px; margin-top: 4px; }

  /* Skull tattoo */
  #skull-tattoo {
    display: none;
    position: absolute;
    top: 200px;
    left: 165px;
    z-index: 2;
    pointer-events: none;
  }
  #skull-tattoo.show { display: block; }
  #skull-tattoo img {
    width: 36px;
    height: 40px;
    opacity: 0;
    transition: opacity 1.5s ease;
  }
  #skull-tattoo.show img { opacity: 0.85; }

  /* Stat bars */
  .stat-bar.bladder { background: linear-gradient(90deg, #f39c12, #f1c40f); }
  .stat-bar.tiredness { background: linear-gradient(90deg, #9b59b6, #c39bd3); }

  /* Speech bubble */
  #speech-bubble {
    position: absolute; top: 15px; right: 30px; z-index: 10;
    background: #fff; color: #333; padding: 8px 14px; border-radius: 15px;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    max-width: 180px; opacity: 0; transition: opacity 0.3s;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }
  #speech-bubble::after {
    content: ''; position: absolute; bottom: -10px; left: 30px;
    border-width: 10px 8px 0; border-style: solid; border-color: #fff transparent transparent;
  }
  #speech-bubble.show { opacity: 1; }
  /* Warning */
  #warning {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    z-index: 15; font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: #e74c3c; opacity: 0; transition: opacity 0.3s;
    text-shadow: 0 0 10px rgba(231,76,60,0.8); white-space: nowrap;
  }
  #warning.show { opacity: 1; animation: pulse-bar 1s ease infinite; }
  /* Game over */
  #game-over {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 100;
    justify-content: center; align-items: center; flex-direction: column;
    border-radius: 12px;
  }
  #game-over.show { display: flex; }
  #game-over h2 {
    font-family: 'Press Start 2P', monospace; font-size: 18px; color: #e74c3c;
    margin-bottom: 15px; text-shadow: 0 0 10px rgba(231,76,60,0.6);
  }
  #game-over p {
    font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa;
    margin-bottom: 25px; line-height: 2;
  }
  #restart-btn {
    font-family: 'Press Start 2P', monospace; font-size: 12px; padding: 12px 30px;
    background: linear-gradient(180deg, #6b3fa0, #4a2d7a); border: 3px solid #8b5cf6;
    border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 4px 0 #2a0d4a;
  }
  #restart-btn:hover { background: linear-gradient(180deg, #7b4fb0, #5a3d8a); }
  /* Stats */
  #stats { display: flex; justify-content: center; gap: 12px; margin: 20px 0 15px; flex-wrap: wrap; }
  .stat { text-align: center; min-width: 115px; }
  .stat-label { font-family: 'Press Start 2P', monospace; font-size: 8px; margin-bottom: 5px; color: #cba6f7; }
  .stat-bar-bg {
    width: 115px; height: 16px; background: #2a1a3e; border: 2px solid #6b3fa0;
    border-radius: 8px; overflow: hidden;
  }
  .stat-bar {
    height: 100%; border-radius: 6px; transition: width 0.5s ease;
    position: relative;
  }
  .stat-bar::after {
    content: ''; position: absolute; top: 2px; left: 4px; right: 4px; height: 3px;
    background: rgba(255,255,255,0.25); border-radius: 3px;
  }
  .stat-bar.food { background: linear-gradient(90deg, #e74c3c, #ff6b6b); }
  .stat-bar.thirst { background: linear-gradient(90deg, #3498db, #74b9ff); }
  .stat-bar.love { background: linear-gradient(90deg, #e84393, #fd79a8); }
  .stat-bar.low { animation: pulse-bar 0.8s ease infinite; }
  @keyframes pulse-bar { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .stat-value { font-family: 'Press Start 2P', monospace; font-size: 7px; margin-top: 3px; color: #a0a0a0; }
  /* Buttons */
  .actions-group { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
  .action-btn {
    font-family: 'Press Start 2P', monospace; font-size: 22px;
    background: linear-gradient(180deg, #4a2d7a, #3a1d6a); border: 3px solid #8b5cf6;
    border-radius: 15px; color: #f0e6d3; padding: 12px 20px; cursor: pointer;
    transition: all 0.15s; box-shadow: 0 4px 0 #2a0d4a, 0 0 15px rgba(139,92,246,0.3);
    user-select: none;
  }
  .action-btn:hover {
    background: linear-gradient(180deg, #5a3d8a, #4a2d7a);
    box-shadow: 0 4px 0 #2a0d4a, 0 0 25px rgba(139,92,246,0.5); transform: translateY(-2px);
  }
  .action-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a0d4a; }
  .action-btn .btn-label { display: block; font-size: 8px; margin-top: 5px; color: #cba6f7; }
  .action-btn:disabled, .action-btn.cooldown { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  /* Particles */
  .particle {
    position: absolute; font-size: 18px; pointer-events: none; z-index: 20;
    animation: float-up 1.2s ease-out forwards;
  }
  @keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-80px) scale(1.5);} }
  /* Stars */
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
    z-index: 0; animation: twinkle 2s ease infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
  #timer { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #6b3fa0; margin-top: 10px; }
</style>
</head>
<body>
<div id="game-container">
  <h1>~ Furby Care ~</h1>

  <div id="room-tabs">
    <button class="room-tab active" data-room="living" onclick="switchRoom('living')">&#x1F3E0; Living</button>
    <button class="room-tab" data-room="bathroom" onclick="switchRoom('bathroom')">&#x1F6C1; Bath</button>
    <button class="room-tab" data-room="bedroom" onclick="switchRoom('bedroom')">&#x1F6CF;&#xFE0F; Bed</button>
  </div>

  <div id="furby-stage" class="room-living">
    <div id="speech-bubble"></div>
    <div id="warning"></div>

    <div id="furby-wrap" class="idle">
      <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
        <!-- Multicolor Furby from SVG file -->

        <!-- LEFT EAR -->
        <g id="left-ear">
          <path style="fill:#0484AB;" d="M32.663,44.769c2.274-5.949,5.851-10.615,10.11-13.672c-1.926-3.187-7.359-6.741-17.153-7.882
            c-0.675-0.079-1.349,0.153-1.833,0.63s-0.724,1.148-0.654,1.824C23.868,32.759,27.313,42.041,32.663,44.769z"/>
          <path style="fill:#6FDAF1;" d="M34.75,29c0.551-0.482-7.208-4.095-8.5-2.875c-2.25,2.125,5,12.625,5,12.625s-3.167-7.916-2-9.375
            C30.25,28.125,33.75,29.875,34.75,29z"/>
        </g>

        <!-- RIGHT EAR -->

<script>
// ===== AUDIO ENGINE =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', vol = 0.15, sweep = 0, vibratoHz = 0, vibratoDepth = 0, delay = 0) {
  const ac = getAudio();
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.linearRampToValueAtTime(freq + sweep, t0 + duration);
  if (vibratoHz) {
    const lfo = ac.createOscillator();
    const lfoGain = ac.createGain();
    lfo.frequency.value = vibratoHz;
    lfoGain.gain.value = vibratoDepth;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start(t0);
    lfo.stop(t0 + duration);
  }
  gain.gain.setValueAtTime(0.001, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  gain.gain.setValueAtTime(vol, t0 + duration * 0.7);
  gain.gain.linearRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + duration);
}

function furbyBabble(moodType) {
  const syllables = 2 + Math.floor(Math.random() * 3);
  let baseFreq, sweepRange, vibratoHz, vibratoDepth, vol;
  switch (moodType) {
    case 'happy': baseFreq = 500 + Math.random() * 200; sweepRange = 150; vibratoHz = 25; vibratoDepth = 30; vol = 0.12; break;
    case 'sad': baseFreq = 280 + Math.random() * 80; sweepRange = -100; vibratoHz = 6; vibratoDepth = 20; vol = 0.10; break;
    case 'angry': baseFreq = 200 + Math.random() * 100; sweepRange = -60; vibratoHz = 35; vibratoDepth = 50; vol = 0.14; break;
    default: baseFreq = 380 + Math.random() * 120; sweepRange = 50; vibratoHz = 12; vibratoDepth = 15; vol = 0.10;
  }
  for (let i = 0; i < syllables; i++) {
    const f = baseFreq + (Math.random() - 0.5) * 200;
    const dur = 0.08 + Math.random() * 0.12;
    const sw = (Math.random() - 0.5) * sweepRange * 2;
    const delay = i * (dur + 0.03 + Math.random() * 0.04);
    playTone(f, dur, 'sine', vol, sw, vibratoHz, vibratoDepth, delay);
    playTone(f * 1.5, dur * 0.7, 'triangle', vol * 0.3, sw * 0.5, vibratoHz, vibratoDepth * 0.5, delay);
  }
}
function furbyEatSound() {
  for (let i = 0; i < 3; i++) {
    const d = i * 0.18;
    playTone(600, 0.06, 'square', 0.06, -300, 0, 0, d);
    playTone(1200 + Math.random() * 400, 0.04, 'sawtooth', 0.04, -800, 0, 0, d + 0.06);
    playTone(250, 0.10, 'sine', 0.08, 30, 20, 15, d + 0.04);
  }
  playTone(700, 0.12, 'sine', 0.10, 200, 30, 40, 0.6);
}
function furbyDrinkSound() {
  for (let i = 0; i < 3; i++) {
    const d = i * 0.22;
    playTone(200, 0.10, 'sine', 0.10, 250, 0, 0, d);
    playTone(500, 0.12, 'sine', 0.06, -100, 15, 80, d + 0.05);
    playTone(800, 0.03, 'square', 0.04, -400, 0, 0, d + 0.14);
  }
  playTone(450, 0.25, 'sine', 0.10, -80, 8, 20, 0.7);
}

}

let isOnToilet = false;
let isSleeping = false;

let needsToilet = false;

// ===== SVG ANIMATION HELPERS =====
function setMoodVisual(m) {
  wrap.classList.remove('sad-mood', 'angry-mood');
  if (m === 'sad') wrap.classList.add('sad-mood');
  if (m === 'angry') wrap.classList.add('angry-mood');
}

function blink() {
  if (isSleeping) return; // already closed
  wrap.classList.add('blink');
  setTimeout(() => wrap.classList.remove('blink'), 180);
}

// ===== ROOM SWITCHING =====
function switchRoom(room) {
  if (isSleeping || isOnToilet || isLeaving || gameOver || isPooped) return;
  if (demandingSleep && room !== 'bedroom') return;
  currentRoom = room;

  // Update tabs
  document.querySelectorAll('.room-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-room="${room}"]`).classList.add('active');

  // Update stage background
  const stage = document.getElementById('furby-stage');
  stage.classList.remove('room-living', 'room-bathroom', 'room-bedroom');
  stage.classList.add('room-' + room);

  // Show/hide action groups
  document.querySelectorAll('.actions-group').forEach(g => g.style.display = 'none');
  document.getElementById('actions-' + room).style.display = 'flex';
}

// ===== TOILET BREAK =====
function triggerToiletBreak() {
  if (isOnToilet || isLeaving || gameOver || isSleeping) return;
  isOnToilet = true;

  // Switch to living room for toilet animation
  if (currentRoom !== 'living') switchRoom('living');

  const el = document.getElementById('speech-bubble');
  el.textContent = 'Gotta go!!';
  el.classList.add('show');
  furbyToiletSound();

  document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
  document.querySelectorAll('.room-tab').forEach(t => t.disabled = true);

  wrap.classList.remove('idle');
  wrap.classList.add('potty-walk');

  setTimeout(() => {
    el.classList.remove('show');
    const toiletScreen = document.getElementById('toilet-screen');
    toiletScreen.classList.add('show');

    const sfxEl = document.getElementById('toilet-sfx');
    const thoughtEl = document.getElementById('toilet-thought');

    const sfxFrames = ['💦', '🚽', '💨', '😌', '🧻'];
    const thoughts = ['La la la~', '...', 'Ahhh~', 'Almost done!', 'Much better!'];
    let frame = 0;
    sfxEl.textContent = sfxFrames[0];
    thoughtEl.textContent = thoughts[0];
    furbyToiletSfx();

    const sfxInterval = setInterval(() => {
      frame++;
      if (frame < sfxFrames.length) {
        sfxEl.textContent = sfxFrames[frame];
        thoughtEl.textContent = thoughts[frame];
      }
    }, 700);

    setTimeout(() => {
      clearInterval(sfxInterval);
      toiletScreen.classList.remove('show');
      wrap.classList.remove('potty-walk');
      wrap.classList.add('potty-return');

      el.textContent = 'Ahh, better!';
      el.classList.add('show');
      furbyReliefSound();
      bladderPressure = 0;
      updateBladderBar();

      setTimeout(() => {
        el.classList.remove('show');
        wrap.classList.remove('potty-return');
        wrap.classList.add('idle');
        isOnToilet = false;
        document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
        document.querySelectorAll('.room-tab').forEach(t => t.disabled = false);
      }, 1400);

    }, 3500);

  }, 1200);
}

function poopAccident() {

// ===== ACTIONS =====
let lastActionTime = 0;
const ACTION_COOLDOWN = 2000;
function doAction(type) {
  if (gameOver || isLeaving || isOnToilet || isPooped) return;
  const now = Date.now();
  if (now - lastActionTime < ACTION_COOLDOWN) return;
  lastActionTime = now;
  const btns = document.querySelectorAll('.action-btn');
  btns.forEach(b => b.classList.add('cooldown'));
  setTimeout(() => btns.forEach(b => b.classList.remove('cooldown')), ACTION_COOLDOWN);

  // Sleep/wake toggle
  if (type === 'sleep') { startSleep(); return; }
  if (type === 'wake') { wakeUp(); return; }

  // Can't do actions while sleeping (except wake)
  if (isSleeping) return;

  // Remove lingering action classes
  wrap.classList.remove('idle', 'bounce', 'wiggle', 'squish', 'eating', 'drinking', 'petting');

  // Living room actions
  if (type === 'food') {
    stats.food = Math.min(100, stats.food + FILL_AMOUNT);
    lowTimers.food = 0;
    isEating = true;
    wrap.classList.add('bounce', 'eating');
    showSpeech('eating');
    furbyEatSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('🍔'), i * 200);
  } else if (type === 'thirst') {
    stats.thirst = Math.min(100, stats.thirst + FILL_AMOUNT);
    lowTimers.thirst = 0;
    isDrinking = true;
    wrap.classList.add('wiggle', 'drinking');
    showSpeech('drinking');
    furbyDrinkSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('💧'), i * 200);
  } else if (type === 'love') {
    stats.love = Math.min(100, stats.love + FILL_AMOUNT);
    lowTimers.love = 0;
    isPetting = true;
    wrap.classList.add('squish', 'petting');
    showSpeech('petting');
    furbyPetSound();
    for (let i = 0; i < 5; i++) setTimeout(() => spawnParticle('💕'), i * 150);
  }
  // Bathroom actions
  else if (type === 'wash') {
    stats.love = Math.min(100, stats.love + FILL_AMOUNT);
    lowTimers.love = 0;
    isPetting = true;
    wrap.classList.add('wiggle');
    showSpeech('washing');
    furbyWashSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('🫧'), i * 200);
  } else if (type === 'hair') {
    stats.love = Math.min(100, stats.love + FILL_AMOUNT);
    lowTimers.love = 0;
    isPetting = true;
    wrap.classList.add('squish');
    showSpeech('hairdress');
    furbyHairSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('✨'), i * 200);
  } else if (type === 'teeth') {
    stats.love = Math.min(100, stats.love + FILL_AMOUNT);
    lowTimers.love = 0;
    isPetting = true;
    wrap.classList.add('bounce');
    showSpeech('brushing');
    furbyTeethSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('🦷'), i * 200);
  }

  // Reset packing if recovering
  suitcase.classList.remove('show');
  packingItems.style.display = 'none';

  setTimeout(() => {
    isEating = false; isDrinking = false; isPetting = false;
    wrap.classList.remove('bounce', 'wiggle', 'squish', 'eating', 'drinking', 'petting');
    if (!isSleeping) wrap.classList.add('idle');
  }, 1500);
  updateBars();
}

function updateBars() {
  ['food', 'thirst', 'love'].forEach(key => {
    const bar = document.getElementById(key === 'love' ? 'love-bar' : key + '-bar');

    bar.style.width = stats[key] + '%';
    val.textContent = Math.round(stats[key]) + '%';
    bar.classList.toggle('low', stats[key] < LOW_THRESHOLD);
  });

function calcMood() {
  if (tiredness > 90) return 'sad';
  const avg = (stats.food + stats.thirst + stats.love) / 3;
  if (stats.food < 10 || stats.thirst < 10 || stats.love < 10) return 'angry';
  if (stats.food < LOW_THRESHOLD || stats.thirst < LOW_THRESHOLD || stats.love < LOW_THRESHOLD) return 'sad';
  if (tiredness > TIRED_THRESHOLD) return 'neutral';
  if (avg > 60) return 'happy';
  return 'neutral';
}

// ===== MAIN LOOP =====
let lastTime = Date.now();
let snoreTick = 0;

function gameLoop() {
  const now = Date.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  if (gameOver || isLeaving) {
    requestAnimationFrame(gameLoop);
    return;
  }

  // While on toilet, keep lastTime fresh but skip game logic
  if (isOnToilet) {
    stats.love = Math.max(0, stats.love - DECAY_RATE.love * dt);
    tiredness = Math.min(100, tiredness + TIREDNESS_FILL_RATE * Math.min(dt, 0.1));
    updateBars();
    updateTiredBar();
    requestAnimationFrame(gameLoop);
    return;
  }

  // Cap dt to avoid huge jumps after pauses
  const cappedDt = Math.min(dt, 0.1);

  // Sleeping state
  if (isSleeping) {
    tiredness = Math.max(0, tiredness - SLEEP_RECOVERY_RATE * cappedDt);
    updateTiredBar();

    // Stats still decay while sleeping
    stats.food = Math.max(0, stats.food - DECAY_RATE.food * cappedDt);
    stats.thirst = Math.max(0, stats.thirst - DECAY_RATE.thirst * cappedDt);
    stats.love = Math.max(0, stats.love - DECAY_RATE.love * cappedDt * 0.5); // love decays slower while sleeping
    updateBars();

    // Snore sounds
    snoreTick++;
    if (snoreTick % 200 === 0) furbySnoreSound();
    if (snoreTick % 350 === 0) showSpeech('sleeping');

    // Auto wake when tiredness is gone
    if (tiredness <= 0) {
      wakeUp();
    }

    // Timer
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById('time-display').textContent =
      `${Math.floor(elapsed / 60)}:${(elapsed % 60).toString().padStart(2, '0')}`;

    requestAnimationFrame(gameLoop);
    return;
  }

  // Decay
  stats.food = Math.max(0, stats.food - DECAY_RATE.food * cappedDt);
  stats.thirst = Math.max(0, stats.thirst - DECAY_RATE.thirst * cappedDt);
  stats.love = Math.max(0, stats.love - DECAY_RATE.love * cappedDt);

  // Tiredness increases over time
  tiredness = Math.min(100, tiredness + TIREDNESS_FILL_RATE * cappedDt);
  updateTiredBar();

  // Tiredness demand mechanic
  if (tiredness > TIRED_THRESHOLD && !demandingSleep) {
    tiredDemandTimer += cappedDt;
    if (tiredDemandTimer >= TIRED_DEMAND_TIME) {
      demandingSleep = true;
      // Force switch to bedroom
      switchRoom('bedroom');
      showSpeech('sleepy');
      furbyYawnSound();
      // Highlight bedroom tab, disable others
      document.querySelectorAll('.room-tab').forEach(t => {
        if (t.dataset.room !== 'bedroom') t.disabled = true;
      });
      document.querySelector('[data-room="bedroom"]').classList.add('demanding');
    }
  } else if (tiredness <= TIRED_THRESHOLD) {
    tiredDemandTimer = 0;
  }

  // Low timers
  ['food', 'thirst', 'love'].forEach(key => {
    const wasLow = lowTimers[key] > 0;
    if (stats[key] < LOW_THRESHOLD) {
      if (!wasLow) furbySadSound();
      lowTimers[key] += cappedDt;
    } else {
      lowTimers[key] = 0;
    }
  });

  // Skull tattoo - appears when love is low for too long
  if (!hasSkullTattoo && lowTimers.love >= SKULL_TATTOO_TIME) {
    hasSkullTattoo = true;
    document.getElementById('skull-tattoo').classList.add('show');
    document.getElementById('tattoo-skull').style.display = '';
    document.getElementById('tattoo-heart').style.display = 'none';
  }
  // Swap skull to heart tattoo when love recovers
  if (hasSkullTattoo && stats.love >= HIGH_STAT) {
    document.getElementById('tattoo-skull').style.display = 'none';
    document.getElementById('tattoo-heart').style.display = '';
  }

  // Leaving check
  const allLow = stats.food < LOW_THRESHOLD && stats.thirst < LOW_THRESHOLD && stats.love < LOW_THRESHOLD;
  const maxLowTime = Math.max(lowTimers.food, lowTimers.thirst, lowTimers.love);
  if (allLow && maxLowTime >= CRITICAL_TIME) triggerLeaving();

  // Packing suitcase animation
  if (allLow && maxLowTime > CRITICAL_TIME * 0.3) {
    suitcase.classList.add('show');
    packingItems.style.display = 'block';
  } else {
    suitcase.classList.remove('show');
    packingItems.style.display = 'none';
  }

  // Warning
  const warning = document.getElementById('warning');
  if (isPooped) {
    warning.textContent = 'Furby had an accident! Clean up!';
    warning.classList.add('show');
  } else if (needsToilet) {
    warning.textContent = `Take Furby to toilet! ${Math.ceil(toiletRequestTime)}s!`;
    warning.classList.add('show');
  } else if (demandingSleep) {
    warning.textContent = 'Furby is SO sleepy! Put him to bed!';
    warning.classList.add('show');
  } else if (allLow && maxLowTime > CRITICAL_TIME * 0.5) {
    warning.textContent = `Furby is packing... ${Math.ceil(CRITICAL_TIME - maxLowTime)}s left!`;
    warning.classList.add('show');
  } else if (tiredness > TIRED_THRESHOLD) {
    warning.textContent = 'Furby is getting sleepy...';
    warning.classList.add('show');
  } else if (stats.food < LOW_THRESHOLD || stats.thirst < LOW_THRESHOLD || stats.love < LOW_THRESHOLD) {
    warning.textContent = 'Stats getting low!';
    warning.classList.add('show');
  } else {
    warning.classList.remove('show');
  }

  // Bladder pressure - fills when food AND thirst are high
  if (stats.food > HIGH_STAT && stats.thirst > HIGH_STAT) {
    const intensity = ((stats.food - HIGH_STAT) + (stats.thirst - HIGH_STAT)) / 80;
    bladderPressure = Math.min(100, bladderPressure + BLADDER_FILL_RATE * intensity * cappedDt);
  } else {
    bladderPressure = Math.max(0, bladderPressure - 0.5 * cappedDt);
  }
  updateBladderBar();

  // Trigger toilet request (player must click within TOILET_TIMEOUT seconds)
  if (bladderPressure >= BLADDER_THRESHOLD && !needsToilet && !isPooped && !isOnToilet && !demandingSleep) {
    showToiletRequest();
  }

  // Update toilet request countdown
  if (needsToilet) {
    toiletRequestTime -= cappedDt;
    document.getElementById('toilet-countdown').textContent = Math.ceil(Math.max(0, toiletRequestTime));
    if (toiletRequestTime <= 0) {
      poopAccident();
    }
  }

  // Extra love decay while pooped
  if (isPooped) {
    stats.love = Math.max(0, stats.love - DECAY_RATE.love * cappedDt * 2);
  }

  // Mood
  mood = calcMood();
  setMoodVisual(mood);

  // Blink
  animTick++;
  if (animTick % 90 === 0) blink();
  if (animTick % 300 === 0 && !isEating && !isDrinking && !isPetting) {
    if (demandingSleep || tiredness > TIRED_THRESHOLD) showSpeech('sleepy');
    else if (bladderPressure > 60) showSpeech('potty');
    else showSpeech(mood);
  }
  if (animTick % 180 === 0 && !isEating && !isDrinking && !isPetting && Math.random() < 0.4) {
    if (tiredness > TIRED_THRESHOLD) furbyYawnSound();
    else furbyIdleChirp();
  }

  updateBars();

  // Timer
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('time-display').textContent =
    `${Math.floor(elapsed / 60)}:${(elapsed % 60).toString().padStart(2, '0')}`;

  requestAnimationFrame(gameLoop);
}

addStars();
gameLoop();
</script>

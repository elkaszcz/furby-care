<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furby Care</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0a2e;
    color: #f0e6d3;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #game-container { position: relative; width: 700px; text-align: center; }
  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: #ff9ecf;
    text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493;
    margin-bottom: 15px;
    letter-spacing: 2px;
  }
  #furby-stage {
    position: relative;
    background: linear-gradient(180deg, #2d1b4e 0%, #1a0a2e 40%, #3d2b1a 85%, #5a4a30 100%);
    border: 3px solid #6b3fa0;
    border-radius: 15px;
    min-height: 440px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(107,63,160,0.4), inset 0 0 60px rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #furby-stage::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 100%;
    background: linear-gradient(180deg, #8b2252 0%, #c0392b 30%, #8b2252 100%);
    opacity: 0.3; z-index: 0;
  }
  #furby-canvas {
    position: relative;
    z-index: 1;
    image-rendering: pixelated;
  }
  /* Speech bubble */
  #speech-bubble {
    position: absolute; top: 10px; right: 30px; z-index: 10;
    background: #fff; color: #333; padding: 8px 14px; border-radius: 15px;
    font-family: 'Press Start 2P', monospace; font-size: 10px;
    max-width: 180px; opacity: 0; transition: opacity 0.3s;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }
  #speech-bubble::after {
    content: ''; position: absolute; bottom: -10px; left: 30px;
    border-width: 10px 8px 0; border-style: solid; border-color: #fff transparent transparent;
  }
  #speech-bubble.show { opacity: 1; }
  /* Warning */
  #warning {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    z-index: 15; font-family: 'Press Start 2P', monospace; font-size: 9px;
    color: #e74c3c; opacity: 0; transition: opacity 0.3s;
    text-shadow: 0 0 10px rgba(231,76,60,0.8);
  }
  #warning.show { opacity: 1; animation: pulse-bar 1s ease infinite; }
  /* Game over */
  #game-over {
    display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85); z-index: 100;
    justify-content: center; align-items: center; flex-direction: column;
    border-radius: 12px;
  }
  #game-over.show { display: flex; }
  #game-over h2 {
    font-family: 'Press Start 2P', monospace; font-size: 18px; color: #e74c3c;
    margin-bottom: 15px; text-shadow: 0 0 10px rgba(231,76,60,0.6);
  }
  #game-over p {
    font-family: 'Press Start 2P', monospace; font-size: 10px; color: #aaa;
    margin-bottom: 25px; line-height: 2;
  }
  #restart-btn {
    font-family: 'Press Start 2P', monospace; font-size: 12px; padding: 12px 30px;
    background: linear-gradient(180deg, #6b3fa0, #4a2d7a); border: 3px solid #8b5cf6;
    border-radius: 10px; color: white; cursor: pointer; box-shadow: 0 4px 0 #2a0d4a;
  }
  #restart-btn:hover { background: linear-gradient(180deg, #7b4fb0, #5a3d8a); }
  /* Stats */
  #stats { display: flex; justify-content: center; gap: 25px; margin: 20px 0 15px; }
  .stat { text-align: center; min-width: 140px; }
  .stat-label { font-family: 'Press Start 2P', monospace; font-size: 10px; margin-bottom: 6px; color: #cba6f7; }
  .stat-bar-bg {
    width: 140px; height: 18px; background: #2a1a3e; border: 2px solid #6b3fa0;
    border-radius: 9px; overflow: hidden;
  }
  .stat-bar {
    height: 100%; border-radius: 7px; transition: width 0.5s ease, background-color 0.5s;
    position: relative;
  }
  .stat-bar::after {
    content: ''; position: absolute; top: 2px; left: 4px; right: 4px; height: 4px;
    background: rgba(255,255,255,0.25); border-radius: 3px;
  }
  .stat-bar.food { background: linear-gradient(90deg, #e74c3c, #ff6b6b); }
  .stat-bar.thirst { background: linear-gradient(90deg, #3498db, #74b9ff); }
  .stat-bar.love { background: linear-gradient(90deg, #e84393, #fd79a8); }
  .stat-bar.low { animation: pulse-bar 0.8s ease infinite; }
  @keyframes pulse-bar { 0%,100%{opacity:1;} 50%{opacity:0.5;} }
  .stat-value { font-family: 'Press Start 2P', monospace; font-size: 8px; margin-top: 3px; color: #a0a0a0; }
  /* Buttons */
  #actions { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
  .action-btn {
    font-family: 'Press Start 2P', monospace; font-size: 22px;
    background: linear-gradient(180deg, #4a2d7a, #3a1d6a); border: 3px solid #8b5cf6;
    border-radius: 15px; color: #f0e6d3; padding: 12px 20px; cursor: pointer;
    transition: all 0.15s; box-shadow: 0 4px 0 #2a0d4a, 0 0 15px rgba(139,92,246,0.3);
    user-select: none;
  }
  .action-btn:hover {
    background: linear-gradient(180deg, #5a3d8a, #4a2d7a);
    box-shadow: 0 4px 0 #2a0d4a, 0 0 25px rgba(139,92,246,0.5); transform: translateY(-2px);
  }
  .action-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #2a0d4a; }
  .action-btn .btn-label { display: block; font-size: 8px; margin-top: 5px; color: #cba6f7; }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  /* Particles */
  .particle {
    position: absolute; font-size: 18px; pointer-events: none; z-index: 20;
    animation: float-up 1.2s ease-out forwards;
  }
  @keyframes float-up { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-80px) scale(1.5);} }
  /* Stars */
  .star {
    position: absolute; width: 2px; height: 2px; background: #fff; border-radius: 50%;
    z-index: 0; animation: twinkle 2s ease infinite;
  }
  @keyframes twinkle { 0%,100%{opacity:0.3;} 50%{opacity:1;} }
  #timer { font-family: 'Press Start 2P', monospace; font-size: 9px; color: #6b3fa0; margin-top: 10px; }
</style>
</head>
<body>
<div id="game-container">
  <h1>~ Furby Care ~</h1>
  <div id="furby-stage">
    <div id="speech-bubble"></div>
    <div id="warning"></div>
    <canvas id="furby-canvas" width="340" height="400"></canvas>
    <div id="game-over">
      <h2>Furby moved out!</h2>
      <p id="goodbye-msg">He packed his tiny<br>suitcase and left...</p>
      <button id="restart-btn" onclick="restartGame()">Try Again</button>
    </div>
  </div>
  <div id="stats">
    <div class="stat"><div class="stat-label">FOOD</div><div class="stat-bar-bg"><div class="stat-bar food" id="food-bar"></div></div><div class="stat-value" id="food-val">100%</div></div>
    <div class="stat"><div class="stat-label">THIRST</div><div class="stat-bar-bg"><div class="stat-bar thirst" id="thirst-bar"></div></div><div class="stat-value" id="thirst-val">100%</div></div>
    <div class="stat"><div class="stat-label">LOVE</div><div class="stat-bar-bg"><div class="stat-bar love" id="love-bar"></div></div><div class="stat-value" id="love-val">100%</div></div>
  </div>
  <div id="actions">
    <button class="action-btn" id="feed-btn" onclick="doAction('food')">🍔<span class="btn-label">Feed</span></button>
    <button class="action-btn" id="drink-btn" onclick="doAction('thirst')">💧<span class="btn-label">Drink</span></button>
    <button class="action-btn" id="pet-btn" onclick="doAction('love')">💕<span class="btn-label">Pet</span></button>
  </div>
  <div id="timer">Time survived: <span id="time-display">0:00</span></div>
</div>

<script>
// ===== AUDIO ENGINE (Web Audio API - Furby-like sounds) =====
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Helper: play a tone with frequency sweep and vibrato
function playTone(freq, duration, type = 'sine', vol = 0.15, sweep = 0, vibratoHz = 0, vibratoDepth = 0, delay = 0) {
  const ac = getAudio();
  const t0 = ac.currentTime + delay;
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if (sweep) osc.frequency.linearRampToValueAtTime(freq + sweep, t0 + duration);
  // Vibrato via LFO
  if (vibratoHz) {
    const lfo = ac.createOscillator();
    const lfoGain = ac.createGain();
    lfo.frequency.value = vibratoHz;
    lfoGain.gain.value = vibratoDepth;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start(t0);
    lfo.stop(t0 + duration);
  }
  // Envelope
  gain.gain.setValueAtTime(0.001, t0);
  gain.gain.linearRampToValueAtTime(vol, t0 + 0.02);
  gain.gain.setValueAtTime(vol, t0 + duration * 0.7);
  gain.gain.linearRampToValueAtTime(0.001, t0 + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t0);
  osc.stop(t0 + duration);
}

// Furby babble: rapid warbling syllables
function furbyBabble(moodType) {
  const ac = getAudio();
  const syllables = 2 + Math.floor(Math.random() * 3);
  let baseFreq, sweepRange, vibratoHz, vibratoDepth, vol;

  switch (moodType) {
    case 'happy':
      baseFreq = 500 + Math.random() * 200;
      sweepRange = 150;
      vibratoHz = 25;
      vibratoDepth = 30;
      vol = 0.12;
      break;
    case 'sad':
      baseFreq = 280 + Math.random() * 80;
      sweepRange = -100;
      vibratoHz = 6;
      vibratoDepth = 20;
      vol = 0.10;
      break;
    case 'angry':
      baseFreq = 200 + Math.random() * 100;
      sweepRange = -60;
      vibratoHz = 35;
      vibratoDepth = 50;
      vol = 0.14;
      break;
    default: // neutral
      baseFreq = 380 + Math.random() * 120;
      sweepRange = 50;
      vibratoHz = 12;
      vibratoDepth = 15;
      vol = 0.10;
  }

  for (let i = 0; i < syllables; i++) {
    const f = baseFreq + (Math.random() - 0.5) * 200;
    const dur = 0.08 + Math.random() * 0.12;
    const sw = (Math.random() - 0.5) * sweepRange * 2;
    const delay = i * (dur + 0.03 + Math.random() * 0.04);
    playTone(f, dur, 'sine', vol, sw, vibratoHz, vibratoDepth, delay);
    // Harmonic layer for richness
    playTone(f * 1.5, dur * 0.7, 'triangle', vol * 0.3, sw * 0.5, vibratoHz, vibratoDepth * 0.5, delay);
  }
}

// Eating sound: chompy nom-nom
function furbyEatSound() {
  for (let i = 0; i < 3; i++) {
    const delay = i * 0.18;
    // Jaw close: quick downward sweep
    playTone(600, 0.06, 'square', 0.06, -300, 0, 0, delay);
    // Lip smack: noise-like burst
    playTone(1200 + Math.random() * 400, 0.04, 'sawtooth', 0.04, -800, 0, 0, delay + 0.06);
    // Happy "mm" undertone
    playTone(250, 0.10, 'sine', 0.08, 30, 20, 15, delay + 0.04);
  }
  // Satisfied chirp at end
  playTone(700, 0.12, 'sine', 0.10, 200, 30, 40, 0.6);
}

// Drinking sound: slurpy gulps
function furbyDrinkSound() {
  for (let i = 0; i < 3; i++) {
    const delay = i * 0.22;
    // Gulp: rising bubble
    playTone(200, 0.10, 'sine', 0.10, 250, 0, 0, delay);
    // Watery wobble
    playTone(500, 0.12, 'sine', 0.06, -100, 15, 80, delay + 0.05);
    // Swallow pop
    playTone(800, 0.03, 'square', 0.04, -400, 0, 0, delay + 0.14);
  }
  // Ahh~
  playTone(450, 0.25, 'sine', 0.10, -80, 8, 20, 0.7);
}

// Petting sound: purring coo
function furbyPetSound() {
  // Purring: low rumble with vibrato
  playTone(120, 0.6, 'sine', 0.10, 10, 28, 15, 0);
  playTone(180, 0.6, 'triangle', 0.06, 10, 28, 10, 0);
  // Happy coo overtone
  playTone(600, 0.3, 'sine', 0.08, 100, 8, 30, 0.1);
  playTone(750, 0.25, 'sine', 0.06, 50, 6, 20, 0.25);
  // Delighted squeak
  playTone(900, 0.10, 'sine', 0.07, 200, 20, 40, 0.5);
}

// Sad whimper
function furbySadSound() {
  playTone(400, 0.20, 'sine', 0.09, -150, 5, 25, 0);
  playTone(300, 0.25, 'sine', 0.08, -80, 4, 15, 0.22);
  playTone(250, 0.30, 'sine', 0.07, -60, 3, 10, 0.50);
}

// Leaving / goodbye wail
function furbyLeaveSound() {
  // Descending sad wail
  playTone(500, 0.4, 'sine', 0.12, -200, 6, 30, 0);
  playTone(350, 0.5, 'sine', 0.10, -150, 5, 25, 0.45);
  playTone(220, 0.6, 'triangle', 0.08, -80, 4, 20, 1.0);
  // Door slam
  playTone(80, 0.15, 'square', 0.10, -30, 0, 0, 1.8);
  playTone(60, 0.20, 'sawtooth', 0.06, -20, 0, 0, 1.85);
}

// Idle ambient chirps (called occasionally)
function furbyIdleChirp() {
  const f = 500 + Math.random() * 300;
  playTone(f, 0.06 + Math.random() * 0.06, 'sine', 0.05, (Math.random()-0.5) * 200, 20, 20, 0);
}

// ===== GAME STATE =====
let stats = { food: 100, thirst: 100, love: 100 };
let lowTimers = { food: 0, thirst: 0, love: 0 };
let gameOver = false;
let startTime = Date.now();
let animTick = 0;
let mood = 'happy';
let isEating = false, isDrinking = false, isPetting = false;
let blinkOpen = true;
let leaveProgress = 0; // 0 = on screen, 1 = fully off
let isLeaving = false;

const LOW_THRESHOLD = 25;
const CRITICAL_TIME = 30;
const DECAY_RATE = { food: 1.8, thirst: 2.2, love: 1.5 };
const FILL_AMOUNT = 35;

const canvas = document.getElementById('furby-canvas');
const ctx = canvas.getContext('2d');

// ===== COLORS (matching the pixel art screenshot) =====
const C = {
  teal: '#1abc9c', tealDk: '#16a085',
  pink: '#e88fb4', pinkLt: '#f4c2d7',
  orange: '#e67e22', orangeLt: '#f39c12',
  yellow: '#f1c40f', yellowLt: '#f9e154',
  green: '#27ae60', greenLt: '#2ecc71',
  blue: '#2980b9', blueLt: '#5dade2',
  coral: '#e74c3c', coralLt: '#ff6b6b',
  purple: '#8e44ad', purpleLt: '#bb6bd9', purpleDk: '#6c3483',
  lavender: '#c39bd3', lavenderLt: '#d7bce8',
  cream: '#fce4b8', creamLt: '#fef0d5',
  peach: '#f5cba7', peachLt: '#fdebd0',
  brown: '#a0522d', brownLt: '#cd853f', brownDk: '#5c3317',
  white: '#ffffff', whiteOff: '#f0ece4',
  eyeBrown: '#8B4513', eyeDk: '#3e1f0a',
  beakOrange: '#e8a020', beakYellow: '#f0c050',
  furPink: '#d4638a', furTeal: '#3aafa9', furOrange: '#e08040',
  furGreen: '#45b07a', furBlue: '#4a90d0', furCoral: '#d95050',
};

// ===== DRAWING HELPERS =====
function ellipse(cx, cy, rx, ry, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
  ctx.fill();
}

function circle(cx, cy, r, color) {
  ellipse(cx, cy, r, r, color);
}

function roundRect(x, y, w, h, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  ctx.fill();
}

// ===== DRAW FURBY =====
function drawFurby(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();

  // Idle bobbing
  const bob = Math.sin(t * 2.5) * 4;
  // Squish animation on actions
  let squishX = 1, squishY = 1;
  if (isEating) {
    squishY = 1 + Math.sin(t * 12) * 0.04;
    squishX = 1 - Math.sin(t * 12) * 0.02;
  } else if (isDrinking) {
    squishX = 1 + Math.sin(t * 8) * 0.03;
  } else if (isPetting) {
    squishX = 1 + Math.sin(t * 6) * 0.02;
    squishY = 1 + Math.cos(t * 6) * 0.02;
  }

  const cx = canvas.width / 2;
  const cy = 210 + bob;

  ctx.translate(cx, cy);
  ctx.scale(squishX, squishY);
  ctx.translate(-cx, -cy);

  // ---- TUFT / CREST ----
  drawTuft(cx, cy - 128, t);

  // ---- EARS ----
  const earWiggle = Math.sin(t * 3) * 5;
  drawEar(cx - 110, cy - 60, -1, earWiggle, t);
  drawEar(cx + 110, cy - 60, 1, -earWiggle, t);

  // ---- MAIN BODY (head+body merged, round shape) ----
  // Fur body - colorful patches like the screenshot
  drawFurBody(cx, cy, t);

  // ---- BELLY ----
  drawBelly(cx, cy + 40);

  // ---- EYES ----
  drawEyes(cx, cy - 30, t);

  // ---- BEAK ----
  drawBeak(cx, cy + 18, t);

  // ---- CHEEK DECORATIONS ----
  if (mood === 'happy' || isPetting) {
    // Little flower/star decorations like in the screenshot
    drawCheekDeco(cx - 58, cy + 5, t, C.coral);
    drawCheekDeco(cx + 58, cy + 5, t, C.orange);
  }

  // ---- FEET ----
  drawFeet(cx, cy + 130);

  ctx.restore();
}

function drawTuft(cx, baseY, t) {
  const wave = Math.sin(t * 3) * 3;
  // Multiple colorful feather-like tufts
  const tufts = [
    { dx: 0, dy: 0, h: 40, color: C.blueLt, w: 6 },
    { dx: -12, dy: 5, h: 35, color: C.furPink, w: 5 },
    { dx: 12, dy: 5, h: 35, color: C.furGreen, w: 5 },
    { dx: -22, dy: 12, h: 28, color: C.furOrange, w: 5 },
    { dx: 22, dy: 12, h: 28, color: C.furTeal, w: 5 },
    { dx: -8, dy: 3, h: 32, color: C.yellowLt, w: 4 },
    { dx: 8, dy: 3, h: 32, color: C.pinkLt, w: 4 },
  ];

  tufts.forEach((tu, i) => {
    const sway = Math.sin(t * 3 + i * 0.8) * 4;
    ctx.fillStyle = tu.color;
    ctx.beginPath();
    const bx = cx + tu.dx;
    const by = baseY + tu.dy;
    // Teardrop / feather shape pointing up
    ctx.moveTo(bx, by - tu.h + wave);
    ctx.quadraticCurveTo(bx + tu.w + sway, by - tu.h * 0.4, bx + tu.w * 0.5 + sway, by);
    ctx.quadraticCurveTo(bx, by + 3, bx - tu.w * 0.5 - sway, by);
    ctx.quadraticCurveTo(bx - tu.w - sway, by - tu.h * 0.4, bx, by - tu.h + wave);
    ctx.fill();
  });
}

function drawEar(ex, ey, dir, wiggle, t) {
  ctx.save();
  ctx.translate(ex, ey);
  ctx.rotate((wiggle * Math.PI / 180) * dir);

  // Outer ear
  ctx.fillStyle = C.furTeal;
  ctx.beginPath();
  ctx.ellipse(dir * 15, -5, 38, 48, dir * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Colorful patches on outer ear
  ctx.fillStyle = C.furPink;
  ctx.beginPath();
  ctx.ellipse(dir * 20, -20, 15, 18, dir * 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = C.furGreen;
  ctx.beginPath();
  ctx.ellipse(dir * 8, 15, 14, 12, dir * 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Inner ear (pink/lavender)
  ctx.fillStyle = C.lavenderLt;
  ctx.beginPath();
  ctx.ellipse(dir * 12, -2, 24, 32, dir * 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Inner ear highlight
  ctx.fillStyle = C.pinkLt;
  ctx.beginPath();
  ctx.ellipse(dir * 10, -8, 15, 20, dir * 0.3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawFurBody(cx, cy, t) {
  // Main body shape - large rounded form
  // Base fur color
  ellipse(cx, cy + 10, 95, 115, C.furTeal);

  // Colorful patches - like the multicolored Furby
  // Left side patches
  ellipse(cx - 50, cy - 40, 35, 30, C.furPink);
  ellipse(cx - 60, cy + 10, 30, 35, C.furBlue);
  ellipse(cx - 40, cy + 50, 32, 25, C.lavender);

  // Right side patches
  ellipse(cx + 50, cy - 40, 35, 30, C.furGreen);
  ellipse(cx + 60, cy + 10, 30, 35, C.furOrange);
  ellipse(cx + 40, cy + 50, 32, 25, C.furCoral);

  // Top patches
  ellipse(cx - 20, cy - 70, 25, 20, C.orangeLt);
  ellipse(cx + 20, cy - 70, 25, 20, C.yellowLt);

  // Center/face area lighter
  ellipse(cx, cy - 10, 70, 75, C.cream);
  // Slightly darker ring around face
  ctx.strokeStyle = C.brownLt;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cx, cy - 10, 70, 75, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Fur texture - tiny lines around the edge
  const furLines = 30;
  for (let i = 0; i < furLines; i++) {
    const angle = (i / furLines) * Math.PI * 2;
    const rx = 90 + Math.sin(t * 2 + i) * 3;
    const ry = 110 + Math.sin(t * 2 + i) * 3;
    const x1 = cx + Math.cos(angle) * rx;
    const y1 = (cy + 10) + Math.sin(angle) * ry;
    const x2 = cx + Math.cos(angle) * (rx + 6);
    const y2 = (cy + 10) + Math.sin(angle) * (ry + 6);
    const colors = [C.furTeal, C.furPink, C.furGreen, C.furOrange, C.furBlue, C.furCoral];
    ctx.strokeStyle = colors[i % colors.length];
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
}

function drawBelly(cx, cy) {
  // Round cream belly
  ellipse(cx, cy, 52, 50, C.creamLt);
  ellipse(cx, cy, 45, 43, C.peachLt);

  // Soft belly highlight
  ellipse(cx - 8, cy - 10, 20, 18, 'rgba(255,255,255,0.3)');
}

function drawEyes(cx, cy, t) {
  const eyeSpacing = 34;
  const eyeR = 26;

  [-1, 1].forEach(dir => {
    const ex = cx + dir * eyeSpacing;

    if (!blinkOpen) {
      // Closed eye - curved line
      ctx.strokeStyle = C.brownDk;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(ex, cy, eyeR * 0.6, 0.2 * Math.PI, 0.8 * Math.PI);
      ctx.stroke();

      // Eyelashes
      ctx.lineWidth = 2;
      for (let i = 0; i < 3; i++) {
        const a = 0.3 * Math.PI + i * 0.2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(ex + Math.cos(a) * eyeR * 0.6, cy + Math.sin(a) * eyeR * 0.6);
        ctx.lineTo(ex + Math.cos(a) * eyeR * 0.85, cy + Math.sin(a) * eyeR * 0.85 - 3);
        ctx.stroke();
      }
      return;
    }

    // White of eye
    circle(ex, cy, eyeR, C.white);

    // Eye outline
    ctx.strokeStyle = C.brownDk;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(ex, cy, eyeR, 0, Math.PI * 2);
    ctx.stroke();

    // Iris - big and warm brown/orange like the screenshot
    const lookX = Math.sin(t * 0.5) * 2;
    const lookY = Math.cos(t * 0.7) * 1;
    const irisR = 16;
    const iCx = ex + lookX;
    const iCy = cy + lookY + 1;

    // Outer iris ring
    circle(iCx, iCy, irisR, '#c0621a');
    // Inner iris
    circle(iCx, iCy, irisR - 3, '#d4842a');
    // Warm highlight ring
    circle(iCx, iCy, irisR - 6, '#e8a040');

    // Pupil
    circle(iCx, iCy, 7, C.eyeDk);

    // Eye shine (big)
    circle(iCx - 5, iCy - 5, 5, 'rgba(255,255,255,0.9)');
    // Eye shine (small)
    circle(iCx + 4, iCy + 3, 2.5, 'rgba(255,255,255,0.6)');

    // Eyelid expression based on mood
    if (mood === 'angry') {
      ctx.fillStyle = C.cream;
      ctx.beginPath();
      ctx.moveTo(ex - eyeR - 2, cy - eyeR - 2);
      ctx.lineTo(ex + eyeR + 2, cy - eyeR + 10 * dir);
      ctx.lineTo(ex + eyeR + 2, cy - eyeR - 2);
      ctx.fill();
    } else if (mood === 'sad') {
      ctx.fillStyle = C.cream;
      ctx.beginPath();
      ctx.moveTo(ex - eyeR - 2, cy - eyeR + 10 * -dir);
      ctx.lineTo(ex + eyeR + 2, cy - eyeR - 2);
      ctx.lineTo(ex - eyeR - 2, cy - eyeR - 2);
      ctx.fill();
    } else if (mood === 'happy') {
      // Slight happy squint at bottom
      ctx.fillStyle = C.cream;
      ctx.beginPath();
      ctx.arc(ex, cy + 4, eyeR + 1, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.lineTo(ex - eyeR, cy + eyeR + 4);
      ctx.lineTo(ex + eyeR, cy + eyeR + 4);
      ctx.fill();
    }
  });
}

function drawBeak(cx, cy, t) {
  const openAmount = isEating ? Math.abs(Math.sin(t * 12)) * 6 : (isDrinking ? Math.abs(Math.sin(t * 8)) * 4 : 0);

  // Upper beak
  ctx.fillStyle = C.beakOrange;
  ctx.beginPath();
  ctx.moveTo(cx - 14, cy - 2 - openAmount * 0.3);
  ctx.quadraticCurveTo(cx, cy - 12 - openAmount * 0.5, cx + 14, cy - 2 - openAmount * 0.3);
  ctx.quadraticCurveTo(cx, cy + 2, cx - 14, cy - 2 - openAmount * 0.3);
  ctx.fill();

  // Upper beak highlight
  ctx.fillStyle = C.beakYellow;
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy - 4 - openAmount * 0.3);
  ctx.quadraticCurveTo(cx, cy - 10 - openAmount * 0.5, cx + 8, cy - 4 - openAmount * 0.3);
  ctx.quadraticCurveTo(cx, cy - 2, cx - 8, cy - 4 - openAmount * 0.3);
  ctx.fill();

  // Lower beak
  ctx.fillStyle = '#d08818';
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 2 + openAmount * 0.5);
  ctx.quadraticCurveTo(cx, cy + 10 + openAmount, cx + 10, cy + 2 + openAmount * 0.5);
  ctx.quadraticCurveTo(cx, cy + 4, cx - 10, cy + 2 + openAmount * 0.5);
  ctx.fill();

  // Tongue when eating
  if (isEating && openAmount > 3) {
    ctx.fillStyle = '#e87070';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 6 + openAmount * 0.3, 5, 3, 0, 0, Math.PI);
    ctx.fill();
  }

  // Water droplet when drinking
  if (isDrinking) {
    const dropY = (t * 80) % 40;
    ctx.fillStyle = '#74b9ff';
    ctx.globalAlpha = 1 - dropY / 40;
    circle(cx + 2, cy + 12 + dropY, 3, '#74b9ff');
    ctx.globalAlpha = 1;
  }

  // Nose dot
  circle(cx, cy - 3, 2.5, '#c07010');
}

function drawCheekDeco(dx, dy, t, color) {
  // Small flower decoration like in screenshot
  const petals = 5;
  const pr = 5;
  const spin = t * 2;
  for (let i = 0; i < petals; i++) {
    const a = spin + (i / petals) * Math.PI * 2;
    ctx.fillStyle = color;
    circle(dx + Math.cos(a) * pr, dy + Math.sin(a) * pr, 3.5, color);
  }
  circle(dx, dy, 3, C.yellowLt);
}

function drawFeet(cx, cy) {
  [-1, 1].forEach(dir => {
    const fx = cx + dir * 30;
    // Foot base
    roundRect(fx - 18, cy - 5, 36, 16, 8, C.purpleLt);
    // Toe bumps
    for (let i = 0; i < 3; i++) {
      circle(fx - 10 + i * 10, cy + 10, 7, C.purpleDk);
      circle(fx - 10 + i * 10, cy + 9, 7, C.purple);
      // Toe highlight
      circle(fx - 10 + i * 10, cy + 7, 4, C.purpleLt);
    }
  });
}

// ===== DRAW LEAVING FURBY =====
function drawLeavingFurby(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const offsetX = leaveProgress * 500;
  const bobY = Math.sin(t * 8) * 3;

  ctx.save();
  ctx.translate(offsetX, bobY);
  ctx.globalAlpha = Math.max(0, 1 - leaveProgress * 1.2);

  const cx = canvas.width / 2;
  const cy = 210;

  // Sad furby, smaller
  ctx.translate(cx, cy);
  ctx.scale(0.8, 0.8);
  ctx.translate(-cx, -cy);

  // Simple sad body
  ellipse(cx, cy, 80, 95, C.furTeal);
  ellipse(cx - 40, cy - 30, 28, 24, C.furPink);
  ellipse(cx + 40, cy - 30, 28, 24, C.furGreen);
  ellipse(cx, cy - 10, 60, 65, C.cream);

  // Sad eyes
  const eyeSpacing = 30;
  [-1, 1].forEach(dir => {
    const ex = cx + dir * eyeSpacing;
    circle(ex, cy - 30, 20, C.white);
    ctx.strokeStyle = C.brownDk;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(ex, cy - 30, 20, 0, Math.PI * 2); ctx.stroke();
    circle(ex, cy - 28, 10, '#c0621a');
    circle(ex, cy - 28, 5, C.eyeDk);
    circle(ex - 3, cy - 33, 3, 'rgba(255,255,255,0.8)');
    // Tear
    ctx.fillStyle = '#74b9ff';
    ctx.beginPath();
    ctx.moveTo(ex + dir * 8, cy - 15);
    ctx.quadraticCurveTo(ex + dir * 12, cy, ex + dir * 8, cy + 5 + Math.sin(t * 4) * 3);
    ctx.quadraticCurveTo(ex + dir * 4, cy, ex + dir * 8, cy - 15);
    ctx.fill();
    // Sad eyelids
    ctx.fillStyle = C.cream;
    ctx.beginPath();
    ctx.moveTo(ex - 22, cy - 50 + 8 * -dir);
    ctx.lineTo(ex + 22, cy - 50);
    ctx.lineTo(ex - 22, cy - 50);
    ctx.fill();
  });

  // Sad beak
  ctx.fillStyle = C.beakOrange;
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 10);
  ctx.quadraticCurveTo(cx, cy + 2, cx + 10, cy + 10);
  ctx.quadraticCurveTo(cx, cy + 6, cx - 10, cy + 10);
  ctx.fill();

  // "BYE" speech bubble
  ctx.fillStyle = '#fff';
  roundRect(cx + 50, cy - 100, 70, 32, 10, '#fff');
  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 16px "Press Start 2P", monospace';
  ctx.fillText('BYE!', cx + 58, cy - 78);
  // bubble tail
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(cx + 60, cy - 68);
  ctx.lineTo(cx + 45, cy - 58);
  ctx.lineTo(cx + 70, cy - 68);
  ctx.fill();

  // Suitcase
  const sx = cx + 65;
  const sy = cy + 80;
  roundRect(sx - 18, sy - 15, 36, 28, 4, '#8B4513');
  roundRect(sx - 14, sy - 12, 28, 22, 3, '#a0522d');
  roundRect(sx - 6, sy - 20, 12, 8, 3, '#6b3010');
  // Suitcase stripe
  ctx.fillStyle = '#6b3010';
  ctx.fillRect(sx - 14, sy - 2, 28, 3);

  // Feet walking
  const walkCycle = Math.sin(t * 10) * 8;
  drawFeetAt(cx - 5, cy + 110 + walkCycle);
  drawFeetAt(cx + 25, cy + 110 - walkCycle);

  ctx.restore();
}

function drawFeetAt(fx, fy) {
  roundRect(fx - 12, fy, 24, 12, 6, C.purple);
  for (let i = 0; i < 2; i++) {
    circle(fx - 5 + i * 10, fy + 11, 5, C.purpleDk);
  }
}

// ===== SPEECH =====
const phrases = {
  happy: ["Dah-boh!", "Wee-tah!", "Hee hee!", "Me love you!", "Noo-loo!", "Party!"],
  neutral: ["Hmm...", "Boh?", "Kah...", "Doo?", "Mee-mee..."],
  sad: ["Kah-way...", "Me hungry...", "So thirsty...", "Pet me?", "Lonely..."],
  angry: ["Boh-boh!", "Hmph!", "No happy!", "Going away!", "Very mad!"],
  eating: ["Yum yum!", "Nah-bah!", "Nom nom!", "Delish!"],
  drinking: ["Glug glug!", "Ahh~!", "So fresh!"],
  petting: ["Ooh!", "Me like!", "Hee hee!", "Purrrr~"],
};

let speechTimeout = null;
function showSpeech(category) {
  const el = document.getElementById('speech-bubble');
  const list = phrases[category] || phrases.neutral;
  el.textContent = list[Math.floor(Math.random() * list.length)];
  el.classList.add('show');
  clearTimeout(speechTimeout);
  speechTimeout = setTimeout(() => el.classList.remove('show'), 2000);
  // Play mood babble sound (eating/drinking/petting have their own dedicated sounds)
  if (!['eating','drinking','petting'].includes(category)) {
    furbyBabble(category);
  }
}

// ===== PARTICLES =====
function spawnParticle(emoji) {
  const stage = document.getElementById('furby-stage');
  const p = document.createElement('div');
  p.className = 'particle';
  p.textContent = emoji;
  p.style.left = (150 + Math.random() * 300) + 'px';
  p.style.top = (100 + Math.random() * 150) + 'px';
  stage.appendChild(p);
  setTimeout(() => p.remove(), 1200);
}

// ===== ACTIONS =====
function doAction(type) {
  if (gameOver) return;
  stats[type] = Math.min(100, stats[type] + FILL_AMOUNT);
  lowTimers[type] = 0;

  if (type === 'food') {
    isEating = true;
    showSpeech('eating');
    furbyEatSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('🍔'), i * 200);
  } else if (type === 'thirst') {
    isDrinking = true;
    showSpeech('drinking');
    furbyDrinkSound();
    for (let i = 0; i < 4; i++) setTimeout(() => spawnParticle('💧'), i * 200);
  } else {
    isPetting = true;
    showSpeech('petting');
    furbyPetSound();
    for (let i = 0; i < 5; i++) setTimeout(() => spawnParticle('💕'), i * 150);
  }

  setTimeout(() => { isEating = false; isDrinking = false; isPetting = false; }, 1500);
  updateBars();
}

// ===== UI =====
function updateBars() {
  ['food', 'thirst', 'love'].forEach(key => {
    const bar = document.getElementById(key === 'love' ? 'love-bar' : key + '-bar');
    const val = document.getElementById(key === 'love' ? 'love-val' : key + '-val');
    bar.style.width = stats[key] + '%';
    val.textContent = Math.round(stats[key]) + '%';
    bar.classList.toggle('low', stats[key] < LOW_THRESHOLD);
  });
}

function calcMood() {
  const avg = (stats.food + stats.thirst + stats.love) / 3;
  if (stats.food < 10 || stats.thirst < 10 || stats.love < 10) return 'angry';
  if (stats.food < LOW_THRESHOLD || stats.thirst < LOW_THRESHOLD || stats.love < LOW_THRESHOLD) return 'sad';
  if (avg > 60) return 'happy';
  return 'neutral';
}

function addStars() {
  const stage = document.getElementById('furby-stage');
  for (let i = 0; i < 15; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 40 + '%';
    star.style.animationDelay = Math.random() * 2 + 's';
    stage.appendChild(star);
  }
}

// ===== GAME OVER =====
function triggerLeaving() {
  isLeaving = true;
  showSpeech('angry');
  furbyLeaveSound();
  document.querySelectorAll('.action-btn').forEach(b => b.disabled = true);
  document.getElementById('warning').classList.remove('show');
}

function restartGame() {
  stats = { food: 100, thirst: 100, love: 100 };
  lowTimers = { food: 0, thirst: 0, love: 0 };
  gameOver = false;
  isLeaving = false;
  leaveProgress = 0;
  startTime = Date.now();
  mood = 'happy';
  isEating = false; isDrinking = false; isPetting = false;
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('warning').classList.remove('show');
  document.querySelectorAll('.action-btn').forEach(b => b.disabled = false);
  updateBars();
}

// ===== MAIN LOOP =====
let lastTime = Date.now();

function gameLoop() {
  const now = Date.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  const t = now / 1000;

  if (isLeaving) {
    leaveProgress += dt * 0.25;
    drawLeavingFurby(t);
    if (leaveProgress >= 1) {
      gameOver = true;
      isLeaving = false;
      document.getElementById('game-over').classList.add('show');
    }
    requestAnimationFrame(gameLoop);
    return;
  }

  if (gameOver) {
    requestAnimationFrame(gameLoop);
    return;
  }

  // Decay
  stats.food = Math.max(0, stats.food - DECAY_RATE.food * dt);
  stats.thirst = Math.max(0, stats.thirst - DECAY_RATE.thirst * dt);
  stats.love = Math.max(0, stats.love - DECAY_RATE.love * dt);

  // Low timers
  let wasAnyLow = stats.food < LOW_THRESHOLD || stats.thirst < LOW_THRESHOLD || stats.love < LOW_THRESHOLD;
  ['food', 'thirst', 'love'].forEach(key => {
    const wasLow = lowTimers[key] > 0;
    if (stats[key] < LOW_THRESHOLD) {
      if (!wasLow) furbySadSound(); // whimper when a stat first drops low
      lowTimers[key] += dt;
    }
    else lowTimers[key] = 0;
  });

  // Leaving check
  const allLow = stats.food < LOW_THRESHOLD && stats.thirst < LOW_THRESHOLD && stats.love < LOW_THRESHOLD;
  const maxLowTime = Math.max(lowTimers.food, lowTimers.thirst, lowTimers.love);
  if (allLow && maxLowTime >= CRITICAL_TIME) triggerLeaving();

  // Warning
  const warning = document.getElementById('warning');
  if (allLow && maxLowTime > CRITICAL_TIME * 0.5) {
    warning.textContent = `Furby is packing... ${Math.ceil(CRITICAL_TIME - maxLowTime)}s left!`;
    warning.classList.add('show');
  } else if (stats.food < LOW_THRESHOLD || stats.thirst < LOW_THRESHOLD || stats.love < LOW_THRESHOLD) {
    warning.textContent = 'Stats getting low!';
    warning.classList.add('show');
  } else {
    warning.classList.remove('show');
  }

  // Mood & blink
  mood = calcMood();
  animTick++;
  if (animTick % 90 === 0) { blinkOpen = false; setTimeout(() => blinkOpen = true, 150); }
  if (animTick % 300 === 0 && !isEating && !isDrinking && !isPetting) showSpeech(mood);
  // Random idle chirps
  if (animTick % 180 === 0 && !isEating && !isDrinking && !isPetting && Math.random() < 0.4) furbyIdleChirp();

  // Draw
  drawFurby(t);
  updateBars();

  // Timer
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('time-display').textContent =
    `${Math.floor(elapsed / 60)}:${(elapsed % 60).toString().padStart(2, '0')}`;

  requestAnimationFrame(gameLoop);
}

addStars();
gameLoop();
</script>
